    <g transform="translate(60, 610)">
      <rect x="0" y="0" width="480" height="140" rx="20" fill="#FFFFFF"/>
      <rect x="0" y="0" width="480" height="140" rx="20" fill="none" stroke="#0F1B3D" stroke-width="2"/>
      <rect x="20" y="20" width="100" height="100" rx="14" fill="#D4F36A"/>
      <text x="70" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="52">🧳</text>
      <text x="140" y="60" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#0F1B3D">Seyahat çantası</text>
      <text x="140" y="92" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5A6478">Havalimanı · Aktif</text>
