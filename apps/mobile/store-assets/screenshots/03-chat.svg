  <text x="540" y="1720" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">Kimlik açığa çıkmaz</text>
  <text x="540" y="1780" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#B8C0D0">Ne numaran, ne emailin görünür</text>
