      <rect x="60" y="30" width="380" height="80" rx="40" fill="#F0EBDC"/>
      <text x="90" y="80" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#8A8F9C">Mesaj yaz...</text>
      <g transform="translate(470, 30)">
        <rect x="0" y="0" width="80" height="80" rx="40" fill="#F5B83C"/>
        <text x="40" y="55" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#0F1B3D">→</text>
      </g>
    </g>
