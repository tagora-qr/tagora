<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1B3D"/>
      <stop offset="1" stop-color="#1A2F5C"/>
    </linearGradient>
    <radialGradient id="glow" cx="540" cy="800" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5B83C" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#F5B83C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#F0EBDC"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <text x="540" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">Anonim mesajlaşma</text>
  <text x="540" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="600" fill="#D4F36A">Uçtan uca şifreli</text>

  <g transform="translate(240, 380)">
    <rect x="10" y="20" width="600" height="1200" rx="80" fill="#000000" opacity="0.4"/>
    <rect x="0" y="0" width="600" height="1200" rx="80" fill="#0A0A18"/>
    <rect x="0" y="0" width="600" height="1200" rx="80" fill="none" stroke="#2A2A3E" stroke-width="4"/>
    <rect x="20" y="24" width="560" height="1152" rx="60" fill="url(#screenBg)"/>
    <rect x="250" y="24" width="100" height="30" rx="15" fill="#000000"/>

    <text x="60" y="90" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#0F1B3D">9:41</text>

    <g transform="translate(0, 120)">
      <rect x="20" y="0" width="560" height="120" fill="#0F1B3D"/>
      <text x="60" y="42" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#D4F36A">← Aracım</text>
      <text x="60" y="80" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Anonim Ziyaretçi</text>
      <text x="60" y="105" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#D4F36A">Çevrimiçi · Şifreli</text>
    </g>

    <g transform="translate(0, 270)">
      <rect x="140" y="0" width="320" height="60" rx="30" fill="#E8E5D8"/>
      <text x="300" y="38" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5A6478">Sohbet uçtan uca şifreli</text>
    </g>

    <g transform="translate(60, 360)">
      <rect x="0" y="0" width="380" height="60" rx="20" fill="#FFFFFF"/>
      <rect x="0" y="0" width="380" height="60" rx="20" fill="none" stroke="#E0DBC5" stroke-width="1"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0F1B3D">Merhaba, aracınız engelli</text>
    </g>
    <g transform="translate(60, 430)">
      <rect x="0" y="0" width="380" height="60" rx="20" fill="#FFFFFF"/>
      <rect x="0" y="0" width="380" height="60" rx="20" fill="none" stroke="#E0DBC5" stroke-width="1"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0F1B3D">yerde park edilmiş</text>
    </g>
    <text x="60" y="510" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5A6478">14:32</text>

    <g transform="translate(140, 540)">
      <rect x="0" y="0" width="400" height="60" rx="20" fill="#0F1B3D"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#FFFFFF">Aa özür dilerim, hemen</text>
    </g>
    <g transform="translate(140, 610)">
      <rect x="0" y="0" width="400" height="60" rx="20" fill="#0F1B3D"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#FFFFFF">geliyorum. 2 dk.</text>
    </g>
    <text x="480" y="690" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5A6478">14:33 · Okundu</text>

    <g transform="translate(60, 720)">
      <rect x="0" y="0" width="380" height="60" rx="20" fill="#D4F36A"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0F1B3D">Sağolun, sorun değil.</text>
    </g>
    <g transform="translate(60, 790)">
      <rect x="0" y="0" width="380" height="60" rx="20" fill="#D4F36A"/>
      <text x="20" y="38" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0F1B3D">İyi günler!</text>
    </g>
    <text x="60" y="870" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5A6478">14:33</text>

    <g transform="translate(0, 1030)">
