<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F1B3D"/>
      <stop offset="100%" stop-color="#1A2F5C"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg4)"/>

  <!-- Shield icon -->
  <g transform="translate(490, 150)">
    <rect x="0" y="0" width="100" height="100" rx="24" fill="#F5B83C"/>
    <text x="50" y="76" text-anchor="middle" font-size="60">🔒</text>
  </g>

  <!-- Title -->
  <text x="540" y="360" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="60" font-weight="800" fill="#FFFFFF" letter-spacing="-0.03em">
    Verilerin senin.
  </text>

  <!-- Safety features -->
  <g transform="translate(140, 500)">
    <!-- 🇹🇷 KVKK -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="800" height="90" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(245,184,60,0.3)" stroke-width="1"/>
      <text x="40" y="60" font-size="42">🇹🇷</text>
      <text x="120" y="58" font-family="Inter, -apple-system, sans-serif"
            font-size="28" font-weight="600" fill="#FFFFFF">KVKK uyumlu</text>
    </g>

    <!-- 🇪🇺 AB sunucular -->
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="800" height="90" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(245,184,60,0.3)" stroke-width="1"/>
      <text x="40" y="60" font-size="42">🇪🇺</text>
      <text x="120" y="58" font-family="Inter, -apple-system, sans-serif"
            font-size="28" font-weight="600" fill="#FFFFFF">Veriler Frankfurt'ta</text>
    </g>

    <!-- 🔒 Şifreli -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="800" height="90" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(245,184,60,0.3)" stroke-width="1"/>
      <text x="40" y="60" font-size="42">🔐</text>
      <text x="120" y="58" font-family="Inter, -apple-system, sans-serif"
            font-size="28" font-weight="600" fill="#FFFFFF">Uçtan uca şifreli chat</text>
    </g>

    <!-- 🚫 Engelleme -->
    <g transform="translate(0, 360)">
      <rect x="0" y="0" width="800" height="90" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(245,184,60,0.3)" stroke-width="1"/>
      <text x="40" y="60" font-size="42">🚫</text>
      <text x="120" y="58" font-family="Inter, -apple-system, sans-serif"
            font-size="28" font-weight="600" fill="#FFFFFF">Şüpheliyi tek dokunuşla engelle</text>
    </g>
  </g>

  <!-- Bottom line -->
  <text x="540" y="1180" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="30" font-weight="500" fill="#F5B83C">
    Telefonun. Kimliğin. Adresin.
  </text>
  <text x="540" y="1230" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="30" font-weight="700" fill="#FFFFFF">
    Hepsi sende kalır.
  </text>

  <text x="540" y="1310" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="20" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="0.1em">
    TAGORA · tagora.com.tr
  </text>
</svg>
