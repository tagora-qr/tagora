<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#F9FAFB"/>

  <!-- Sticker mockup center -->
  <g transform="translate(340, 320)">
    <rect x="0" y="0" width="400" height="400" rx="32" fill="#0F1B3D" transform="rotate(-3 200 200)"/>
    <rect x="30" y="30" width="340" height="340" rx="20" fill="#FFFFFF" transform="rotate(-3 200 200)"/>
    <!-- Fake QR pattern -->
    <g transform="translate(90, 90) rotate(-3 110 110)">
      <!-- Corner locators -->
      <g>
        <rect x="0" y="0" width="60" height="60" rx="6" fill="#0F1B3D"/>
        <rect x="10" y="10" width="40" height="40" rx="3" fill="#FFFFFF"/>
        <rect x="18" y="18" width="24" height="24" rx="2" fill="#0F1B3D"/>
      </g>
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="60" height="60" rx="6" fill="#0F1B3D"/>
        <rect x="10" y="10" width="40" height="40" rx="3" fill="#FFFFFF"/>
        <rect x="18" y="18" width="24" height="24" rx="2" fill="#0F1B3D"/>
      </g>
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="60" height="60" rx="6" fill="#0F1B3D"/>
        <rect x="10" y="10" width="40" height="40" rx="3" fill="#FFFFFF"/>
        <rect x="18" y="18" width="24" height="24" rx="2" fill="#0F1B3D"/>
      </g>
      <!-- Data pattern -->
      <g fill="#0F1B3D">
        <rect x="80" y="0" width="20" height="20" rx="3"/>
        <rect x="120" y="20" width="20" height="20" rx="3"/>
        <rect x="80" y="40" width="20" height="20" rx="3"/>
        <rect x="100" y="80" width="20" height="20" rx="3"/>
        <rect x="140" y="100" width="20" height="20" rx="3"/>
        <rect x="0" y="80" width="20" height="20" rx="3"/>
        <rect x="40" y="100" width="20" height="20" rx="3"/>
        <rect x="120" y="130" width="20" height="20" rx="3"/>
        <rect x="80" y="160" width="20" height="20" rx="3"/>
        <rect x="180" y="180" width="20" height="20" rx="3"/>
        <rect x="80" y="200" width="20" height="20" rx="3"/>
        <rect x="140" y="200" width="20" height="20" rx="3"/>
        <rect x="200" y="140" width="20" height="20" rx="3"/>
        <rect x="160" y="160" width="20" height="20" rx="3"/>
        <rect x="100" y="120" width="20" height="20" rx="3"/>
      </g>
    </g>
    <!-- Golden badge -->
    <g transform="translate(140, 400) rotate(-3 60 20)">
      <rect x="0" y="0" width="120" height="40" rx="20" fill="#F5B83C"/>
      <text x="60" y="26" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
            font-size="14" font-weight="700" fill="#0F1B3D">tagora.link/xyz</text>
    </g>
  </g>

  <!-- Text -->
  <text x="540" y="880" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#0F1B3D" letter-spacing="-0.03em">
    Cama telefon
  </text>
  <text x="540" y="960" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#0F1B3D" letter-spacing="-0.03em">
    yazma.
  </text>

  <text x="540" y="1080" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="34" font-weight="500" fill="#6B7280">
    Yapıştır. Tarasınlar.
  </text>
  <text x="540" y="1130" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="34" font-weight="500" fill="#6B7280">
    Sen görürsün, kimliğin gizli.
  </text>

  <!-- Bottom brand -->
  <text x="540" y="1290" text-anchor="middle" font-family="Inter, -apple-system, sans-serif"
        font-size="22" font-weight="600" fill="#0F1B3D" letter-spacing="0.1em">
    TAGORA
  </text>
</svg>
