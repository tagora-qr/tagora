<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Green circle background -->
  <circle cx="256" cy="256" r="240" fill="#D4F36A"/>

  <!-- Tag/label — orange gold, with string -->
  <g>
    <!-- Cord/string -->
    <path d="M 360 100 Q 400 60 440 20"
          fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>

    <!-- Tag body -->
    <path d="M 100 240 L 240 100 Q 260 80 288 80 L 400 80 Q 432 80 432 112 L 432 224 Q 432 252 412 272 L 272 412 Q 244 440 216 412 L 100 296 Q 72 268 100 240 Z"
          fill="#F5B83C"/>

    <!-- Tag body highlight -->
    <path d="M 100 240 L 240 100 Q 260 80 288 80 L 400 80 Q 432 80 432 112 L 200 344 L 100 240 Z"
          fill="#FFD700" opacity="0.5"/>

    <!-- Tag border -->
    <path d="M 100 240 L 240 100 Q 260 80 288 80 L 400 80 Q 432 80 432 112 L 432 224 Q 432 252 412 272 L 272 412 Q 244 440 216 412 L 100 296 Q 72 268 100 240 Z"
          fill="none" stroke="#0F1B3D" stroke-width="8"/>

    <!-- Hole -->
    <circle cx="360" cy="152" r="26" fill="#D4F36A"/>
    <circle cx="360" cy="152" r="26" fill="none" stroke="#0F1B3D" stroke-width="6"/>

    <!-- Tag text lines (simulating "info") -->
    <rect x="140" y="240" width="140" height="10" rx="3" fill="#FFFFFF" transform="rotate(-45 210 245)"/>
    <rect x="160" y="270" width="100" height="8" rx="3" fill="#FFFFFF" transform="rotate(-45 210 274)"/>
  </g>
</svg>
