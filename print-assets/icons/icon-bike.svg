<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Bicycle — side view with two wheels, frame, saddle -->
  <g fill="none" stroke="#0F1B3D" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="130" cy="340" r="80"/>
    <!-- Front wheel -->
    <circle cx="382" cy="340" r="80"/>
    <!-- Frame — top tube + down tube + seat tube -->
    <path d="M 200 200 L 300 200 L 240 340 M 300 200 L 382 340 M 200 200 L 130 340"/>
    <!-- Handlebar -->
    <path d="M 200 200 L 200 150 L 240 150"/>
    <!-- Seat/saddle -->
    <path d="M 270 190 L 320 190"/>
  </g>
  <!-- Pedal crank -->
  <circle cx="240" cy="340" r="14" fill="#0F1B3D"/>
  <!-- Wheel hubs -->
  <circle cx="130" cy="340" r="12" fill="#0F1B3D"/>
  <circle cx="382" cy="340" r="12" fill="#0F1B3D"/>
</svg>
