<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Green circle background -->
  <circle cx="256" cy="256" r="240" fill="#D4F36A"/>

  <!-- Bicycle — orange, dynamic side view -->
  <g>
    <!-- Wheels — spokes -->
    <g fill="none" stroke="#1A202C" stroke-width="3" opacity="0.4">
      <line x1="140" y1="340" x2="140" y2="270"/>
      <line x1="140" y1="340" x2="140" y2="410"/>
      <line x1="140" y1="340" x2="70" y2="340"/>
      <line x1="140" y1="340" x2="210" y2="340"/>
      <line x1="140" y1="340" x2="90" y2="290"/>
      <line x1="140" y1="340" x2="190" y2="290"/>
      <line x1="140" y1="340" x2="90" y2="390"/>
      <line x1="140" y1="340" x2="190" y2="390"/>

      <line x1="372" y1="340" x2="372" y2="270"/>
      <line x1="372" y1="340" x2="372" y2="410"/>
      <line x1="372" y1="340" x2="302" y2="340"/>
      <line x1="372" y1="340" x2="442" y2="340"/>
      <line x1="372" y1="340" x2="322" y2="290"/>
      <line x1="372" y1="340" x2="422" y2="290"/>
      <line x1="372" y1="340" x2="322" y2="390"/>
      <line x1="372" y1="340" x2="422" y2="390"/>
    </g>

    <!-- Wheel rims -->
    <circle cx="140" cy="340" r="70" fill="none" stroke="#1A202C" stroke-width="14"/>
    <circle cx="372" cy="340" r="70" fill="none" stroke="#1A202C" stroke-width="14"/>
    <!-- Tires (inner darker) -->
    <circle cx="140" cy="340" r="76" fill="none" stroke="#2D3748" stroke-width="8"/>
    <circle cx="372" cy="340" r="76" fill="none" stroke="#2D3748" stroke-width="8"/>

    <!-- Frame — orange -->
    <g fill="none" stroke="#FF6B35" stroke-width="16" stroke-linecap="round">
      <path d="M 200 200 L 290 200"/>
      <path d="M 200 200 L 240 340"/>
      <path d="M 290 200 L 240 340"/>
      <path d="M 290 200 L 372 340"/>
      <path d="M 200 200 L 140 340"/>
    </g>

    <!-- Handlebar -->
    <g fill="none" stroke="#1A202C" stroke-width="10" stroke-linecap="round">
      <path d="M 200 200 L 200 150"/>
      <path d="M 175 150 L 225 150"/>
    </g>

    <!-- Seat -->
    <g fill="#1A202C">
      <ellipse cx="290" cy="192" rx="26" ry="6"/>
    </g>

    <!-- Pedal crank -->
    <circle cx="240" cy="340" r="16" fill="#1A202C"/>
    <rect x="236" y="340" width="8" height="34" rx="2" fill="#1A202C" transform="rotate(-30 240 340)"/>
    <rect x="230" y="368" width="20" height="8" rx="2" fill="#1A202C"/>

    <!-- Wheel hubs -->
    <circle cx="140" cy="340" r="12" fill="#1A202C"/>
    <circle cx="372" cy="340" r="12" fill="#1A202C"/>
  </g>
</svg>
