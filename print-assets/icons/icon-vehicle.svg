    <path d="M 90 300 L 90 340 Q 90 370 120 370 L 140 370 Q 150 400 176 400 Q 202 400 212 370 L 300 370 Q 310 400 336 400 Q 362 400 372 370 L 392 370 Q 422 370 422 340 L 422 300 L 412 260 L 380 220 Q 370 205 350 200 L 162 200 Q 142 205 132 220 L 100 260 Z"/>
  </g>
  <!-- Cabin (window area) - cut out -->
  <path d="M 175 220 L 205 220 L 205 260 L 155 260 Z" fill="#FFFFFF"/>
  <path d="M 215 220 L 305 220 L 305 260 L 215 260 Z" fill="#FFFFFF"/>
  <path d="M 315 220 L 345 220 L 365 260 L 315 260 Z" fill="#FFFFFF"/>
  <!-- Wheels -->
