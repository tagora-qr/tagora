  <circle cx="176" cy="370" r="14" fill="#FFFFFF"/>
  <circle cx="336" cy="370" r="30" fill="#0F1B3D"/>
  <circle cx="336" cy="370" r="14" fill="#FFFFFF"/>
  <!-- Headlight -->
